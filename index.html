<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Mother Tee Concept Board</title>

<style>

body{
margin:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.board{
max-width:100%;
max-height:100vh;
cursor:pointer;
}

</style>

</head>

<body>

<img src="./mother-board.jpg" class="board" onclick="playAudio()">

<audio id="audio">
<source src="./mother-audio.mp3" type="audio/mpeg">
</audio>

<script>

function playAudio(){
var audio = document.getElementById("audio");

if(audio.paused){
audio.play();
}else{
audio.pause();
}

}

</script>

</body>

</html>
